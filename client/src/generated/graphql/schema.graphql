schema {
  query: Query
  mutation: Mutation
}

type GardenPlantData implements PlantDataInterface {
  _id: ObjectId!
  addedTimestamp: Float!
  addedToGardenTimestamp: Float!
  bloomColors: [String!]
  bloomTimes: [String!]
  commonNames: [String!]
  customThumbnailUrl: String
  fullOccurrencesCount: Int
  habitats: [String!]
  hardiness: [Int!]
  height: PlantSize
  isPerennial: Boolean
  lightLevels: [String!]
  maturityTime: String
  notes: String
  occurrences: [PlantOccurrence!]!
  physicalCharactersticsDump: String
  scientificName: String!
  scrapeSources: [String!]!
  soilTypes: [String!]
  spread: PlantSize
  thumbnailUrl: String
  updatedTimestamp: Float!
  uses: [String!]
}

type GardenPlantRef {
  _id: ObjectId!
  addedToGardenTimestamp: Float!
  customThumbnailUrl: String
}

enum LocationSource {
  custom
  search
}

type Mutation {
  addToGarden(gardenId: String, plantId: String!): UserGarden
  newGarden(gardenName: String): ObjectId!
  replaceWithProxyUrl(occurrenceId: Float!, plantId: String!, replaceUrl: String!): String
  updateGardenPlant(customThumbnailUrl: String, gardenId: String!, note: String, plantId: String!): GardenPlantData
}

scalar ObjectId

input PlantArrayFilterIntInput {
  matchAll: Boolean
  value: [Int]
}

input PlantArrayFilterStringInput {
  matchAll: Boolean
  value: [String]
}

type PlantData implements PlantDataInterface {
  _id: ObjectId!
  addedTimestamp: Float!
  bloomColors: [String!]
  bloomTimes: [String!]
  commonNames: [String!]
  fullOccurrencesCount: Int
  habitats: [String!]
  hardiness: [Int!]
  height: PlantSize
  isPerennial: Boolean
  lightLevels: [String!]
  maturityTime: String
  occurrences: [PlantOccurrence!]!
  physicalCharactersticsDump: String
  scientificName: String!
  scrapeSources: [String!]!
  soilTypes: [String!]
  spread: PlantSize
  thumbnailUrl: String
  updatedTimestamp: Float!
  uses: [String!]
}

type PlantDataExcerpt {
  _id: String!
  isProxyUrl: Boolean
  occurrenceId: Float!
  thumbnailUrl: String
  url: String!
}

input PlantDataInput {
  addedTimestamp: Float
  bloomColors: PlantArrayFilterStringInput
  bloomTimes: PlantArrayFilterStringInput
  boundingPolyCoords: [[[Float!]!]!]
  commonName: String
  habitats: PlantArrayFilterStringInput
  hardiness: PlantArrayFilterIntInput
  height: PlantSizeRangeInput
  isPerennial: [Boolean]
  lightLevels: PlantArrayFilterStringInput
  maturityTime: String
  physicalCharactersticsDump: String
  scientificName: String
  scrapeSources: [String]
  soilTypes: PlantArrayFilterStringInput
  spread: PlantSizeRangeInput
  updatedTimestamp: Float
  uses: PlantArrayFilterStringInput
}

interface PlantDataInterface {
  addedTimestamp: Float!
  bloomColors: [String!]
  bloomTimes: [String!]
  commonNames: [String!]
  fullOccurrencesCount: Int
  habitats: [String!]
  hardiness: [Int!]
  height: PlantSize
  isPerennial: Boolean
  lightLevels: [String!]
  maturityTime: String
  occurrences: [PlantOccurrence!]!
  physicalCharactersticsDump: String
  scientificName: String!
  scrapeSources: [String!]!
  soilTypes: [String!]
  spread: PlantSize
  thumbnailUrl: String
  updatedTimestamp: Float!
  uses: [String!]
}

type PlantMedia {
  isProxyUrl: Boolean
  url: String!
}

type PlantOccurrence {
  media: [PlantMedia!]!
  occurrenceCoords: [Float!]!
  occurrenceId: Float!
}

type PlantOccurrencesResults {
  count: Float!
  results: [PlantOccurrence!]!
}

type PlantSearchQueryResults {
  count: Float!
  results: [PlantData!]!
}

type PlantSize {
  amount: Float!
  unit: PlantSizeUnit!
}

input PlantSizeRangeInput {
  maxAmount: Float
  minAmount: Float
  unit: PlantSizeUnit!
}

enum PlantSizeUnit {
  centimeters
  feet
  inches
  meters
}

enum PlantSortField {
  addedTimestamp
  scientificName
  updatedTimestamp
}

input PlantSortInput {
  field: PlantSortField!
  value: Int!
}

type Query {
  allSearchRecords(booleanFilter: [SearchRecordBooleanFilterInput!], limit: Int, offset: Int, sort: [SearchRecordSortInput!], stringFilter: [SearchRecordStringFilterInput!]): SearchRecordQueryResults!
  allUserGardens(gardenId: String, gardenName: String): [UserGarden!]!
  plant(boundingPolyCoords: [[[Float!]!]!], id: String!): PlantData
  plantOccurrences(id: String!, limit: Int, offset: Int): PlantOccurrencesResults
  plantSearch(limit: Int, offset: Int, sort: [PlantSortInput!], where: PlantDataInput): PlantSearchQueryResults!
  searchRecord(id: String!): SearchRecord
  searchRecordDataCounts(id: String!): SearchRecordPlantCountResults!
  userGarden(gardenId: String, gardenName: String): UserGarden
  userGardenPlants(gardenId: String!, limit: Int, offset: Int, sort: [PlantSortInput!], where: PlantDataInput): UserGardenPlants
}

type SearchRecord {
  _id: ObjectId!
  boundingPolyCoords: [[[Float!]!]!]
  commonName: String
  createdTimestamp: Float!
  lastRanTimestamp: Float
  locationName: String
  locationSource: LocationSource
  occurrencesOffset: Int!
  scientificName: String
  status: SearchRecordStatus!
  taxonKeys: [Int!]
  totalOccurrences: Int!
}

enum SearchRecordBooleanFilterField {
  commonName
  scientificName
}

input SearchRecordBooleanFilterInput {
  field: SearchRecordBooleanFilterField!
  value: Boolean!
}

type SearchRecordPlantCountResults {
  firstPlant: PlantDataExcerpt
  occurrenceCount: Float!
  plantCount: Float!
}

type SearchRecordQueryResults {
  count: Float!
  results: [SearchRecord!]!
}

enum SearchRecordSortField {
  createdTimestamp
  lastRanTimestamp
  locationName
  totalOccurrences
}

input SearchRecordSortInput {
  field: SearchRecordSortField!
  value: Int!
}

enum SearchRecordStatus {
  COMPLETE
  READY
  SCRAPING
}

enum SearchRecordStringFilterField {
  locationSource
  status
}

input SearchRecordStringFilterInput {
  field: SearchRecordStringFilterField!
  value: [String!]!
}

type UserGarden {
  _id: ObjectId!
  gardenName: String!
  gardenThumbnailUrl: String
  plantCount: Float!
  plantRefs: [GardenPlantRef!]!
  userId: String!
}

type UserGardenPlants {
  count: Float!
  results: [GardenPlantData!]!
}