schema {
  query: Query
  mutation: Mutation
}

type GardenPlantData implements PlantDataInterface {
  _id: ObjectId!
  addedTimestamp: Float!
  addedToGardenTimestamp: Float!
  bloomColors: [String!]
  bloomTimes: [String!]
  commonNames: [String!]
  customThumbnailUrl: String
  fullOccurrencesCount: Int
  habitat: String
  hardiness: [Int!]
  height: PlantSize
  isPerennial: Boolean
  lightLevels: [String!]
  maturityTime: String
  occurrences: [PlantOccurrence!]!
  physicalCharactersticsDump: String
  scientificName: String!
  scrapeSources: [String!]!
  soilTypes: [String!]
  spread: PlantSize
  thumbnailUrl: String
  updatedTimestamp: Float!
  uses: [String!]
}

type Mutation {
  addToGarden(gardenName: String, plantId: String!): ObjectId!
  newGarden(gardenName: String): ObjectId!
  replaceWithProxyUrl(occurrenceId: Float!, plantId: String!, replaceUrl: String!): String
}

scalar ObjectId

type PlantData implements PlantDataInterface {
  _id: ObjectId!
  addedTimestamp: Float!
  bloomColors: [String!]
  bloomTimes: [String!]
  commonNames: [String!]
  fullOccurrencesCount: Int
  habitat: String
  hardiness: [Int!]
  height: PlantSize
  isPerennial: Boolean
  lightLevels: [String!]
  maturityTime: String
  occurrences: [PlantOccurrence!]!
  physicalCharactersticsDump: String
  scientificName: String!
  scrapeSources: [String!]!
  soilTypes: [String!]
  spread: PlantSize
  thumbnailUrl: String
  updatedTimestamp: Float!
  uses: [String!]
}

input PlantDataInput {
  _id: ObjectId
  addedTimestamp: Float
  bloomColors: [String!]
  bloomTimes: [String!]
  boundingPolyCoords: [[[Float!]!]!]
  commonName: String
  habitat: String
  hardiness: [Int!]
  height: PlantSizeInput
  isPerennial: Boolean
  lightLevels: [String!]
  maturityTime: String
  physicalCharactersticsDump: String
  scientificName: String
  scrapeSources: [String!]
  soilTypes: [String!]
  spread: PlantSizeInput
  updatedTimestamp: Float
  uses: [String!]
}

interface PlantDataInterface {
  _id: ObjectId!
  addedTimestamp: Float!
  bloomColors: [String!]
  bloomTimes: [String!]
  commonNames: [String!]
  fullOccurrencesCount: Int
  habitat: String
  hardiness: [Int!]
  height: PlantSize
  isPerennial: Boolean
  lightLevels: [String!]
  maturityTime: String
  occurrences: [PlantOccurrence!]!
  physicalCharactersticsDump: String
  scientificName: String!
  scrapeSources: [String!]!
  soilTypes: [String!]
  spread: PlantSize
  thumbnailUrl: String
  updatedTimestamp: Float!
  uses: [String!]
}

type PlantMedia {
  isProxyUrl: Boolean
  url: String!
}

type PlantOccurrence {
  media: [PlantMedia!]!
  occurrenceCoords: [Float!]!
  occurrenceId: Float!
}

type PlantOccurrencesResults {
  count: Float!
  results: [PlantOccurrence!]!
}

type PlantSearchResults {
  count: Float!
  results: [PlantData!]!
}

type PlantSize {
  amount: Int
  unit: PlantSizeUnit
}

input PlantSizeInput {
  amount: Int
  unit: PlantSizeUnit
}

enum PlantSizeUnit {
  cm
  ft
  in
  m
}

type Query {
  allUserGardens: [UserGarden!]!
  plant(boundingPolyCoords: [[[Float!]!]!], id: String!): PlantData
  plantOccurrences(id: String!, limit: Int, offset: Int): PlantOccurrencesResults
  plantSearch(limit: Int, offset: Int, sort: [SortInput!], where: PlantDataInput): PlantSearchResults!
  searchRecord(id: String!): SearchRecord
  userGarden(gardenName: String!): UserGarden
}

type SearchRecord {
  _id: ObjectId!
  jsonStringSearch: String!
  occurrencesOffset: Int!
  status: SearchRecordStatus!
  statusUpdated: Float!
}

enum SearchRecordStatus {
  COMPLETE
  READY
  SCRAPING
}

enum SortField {
  addedTimestamp
  scientificName
  updatedTimestamp
}

input SortInput {
  direction: Int!
  field: SortField!
}

type UserGarden {
  gardenName: String!
  plants: [GardenPlantData!]!
  userId: String!
}