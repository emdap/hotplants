schema {
  query: Query
  mutation: Mutation
}

type AddToGardenResult {
  _id: ObjectId!
  gardenName: String!
  totalPlants: Int!
  userId: String!
}

type GardenPlantData implements PlantDataInterface {
  _id: ObjectId!
  addedTimestamp: Float!
  addedToGardenTimestamp: Float!
  bloomColors: [String!]
  bloomTimes: [String!]
  commonNames: [String!]
  customThumbnailUrl: String
  fullOccurrencesCount: Int
  habitat: String
  hardiness: [Int!]
  height: PlantSize
  isPerennial: Boolean
  lightLevels: [String!]
  maturityTime: String
  occurrences: [PlantOccurrence!]!
  physicalCharactersticsDump: String
  scientificName: String!
  scrapeSources: [String!]!
  soilTypes: [String!]
  spread: PlantSize
  thumbnailUrl: String
  updatedTimestamp: Float!
  uses: [String!]
}

enum LocationSource {
  custom
  search
}

type Mutation {
  addToGarden(gardenName: String, plantId: String!): AddToGardenResult
  newGarden(gardenName: String): ObjectId!
  replaceWithProxyUrl(occurrenceId: Float!, plantId: String!, replaceUrl: String!): String
}

scalar ObjectId

type PlantData implements PlantDataInterface {
  _id: ObjectId!
  addedTimestamp: Float!
  bloomColors: [String!]
  bloomTimes: [String!]
  commonNames: [String!]
  fullOccurrencesCount: Int
  habitat: String
  hardiness: [Int!]
  height: PlantSize
  isPerennial: Boolean
  lightLevels: [String!]
  maturityTime: String
  occurrences: [PlantOccurrence!]!
  physicalCharactersticsDump: String
  scientificName: String!
  scrapeSources: [String!]!
  soilTypes: [String!]
  spread: PlantSize
  thumbnailUrl: String
  updatedTimestamp: Float!
  uses: [String!]
}

input PlantDataInput {
  _id: ObjectId
  addedTimestamp: Float
  bloomColors: [String!]
  bloomTimes: [String!]
  boundingPolyCoords: [[[Float!]!]!]
  commonName: String
  habitat: String
  hardiness: [Int!]
  height: PlantSizeInput
  isPerennial: Boolean
  lightLevels: [String!]
  maturityTime: String
  physicalCharactersticsDump: String
  scientificName: String
  scrapeSources: [String!]
  soilTypes: [String!]
  spread: PlantSizeInput
  updatedTimestamp: Float
  uses: [String!]
}

interface PlantDataInterface {
  _id: ObjectId!
  addedTimestamp: Float!
  bloomColors: [String!]
  bloomTimes: [String!]
  commonNames: [String!]
  fullOccurrencesCount: Int
  habitat: String
  hardiness: [Int!]
  height: PlantSize
  isPerennial: Boolean
  lightLevels: [String!]
  maturityTime: String
  occurrences: [PlantOccurrence!]!
  physicalCharactersticsDump: String
  scientificName: String!
  scrapeSources: [String!]!
  soilTypes: [String!]
  spread: PlantSize
  thumbnailUrl: String
  updatedTimestamp: Float!
  uses: [String!]
}

type PlantMedia {
  isProxyUrl: Boolean
  url: String!
}

type PlantOccurrence {
  media: [PlantMedia!]!
  occurrenceCoords: [Float!]!
  occurrenceId: Float!
}

type PlantOccurrencesResults {
  count: Float!
  results: [PlantOccurrence!]!
}

type PlantSearchQueryResults {
  count: Float!
  results: [PlantData!]!
}

type PlantSize {
  amount: Int
  unit: PlantSizeUnit
}

input PlantSizeInput {
  amount: Int
  unit: PlantSizeUnit
}

enum PlantSizeUnit {
  cm
  ft
  in
  m
}

enum PlantSortField {
  addedTimestamp
  scientificName
  updatedTimestamp
}

input PlantSortInput {
  direction: Int!
  field: PlantSortField!
}

type Query {
  allSearchRecords(booleanFilter: [SearchRecordBooleanFilterInput!], limit: Int, offset: Int, sort: [SearchRecordSortInput!], stringFilter: [SearchRecordStringFilterInput!]): SearchRecordQueryResults!
  allUserGardens: [UserGarden!]!
  plant(boundingPolyCoords: [[[Float!]!]!], id: String!): PlantData
  plantOccurrences(id: String!, limit: Int, offset: Int): PlantOccurrencesResults
  plantSearch(limit: Int, offset: Int, sort: [PlantSortInput!], where: PlantDataInput): PlantSearchQueryResults!
  searchRecord(id: String!): SearchRecord
  searchRecordDataCounts(id: String!): SearchRecordPlantCountResults!
  userGarden(gardenName: String!): UserGarden
}

type SearchRecord {
  _id: ObjectId!
  boundingPolyCoords: [[[Float!]!]!]!
  commonName: String
  createdTimestamp: Float!
  locationName: String!
  locationSource: LocationSource!
  occurrencesOffset: Int!
  scientificName: String
  status: SearchRecordStatus!
  statusUpdatedTimestamp: Float
  taxonKeys: [Int!]
  totalOccurrences: Int!
}

enum SearchRecordBooleanFilterField {
  commonName
  scientificName
}

input SearchRecordBooleanFilterInput {
  field: SearchRecordBooleanFilterField!
  value: Boolean!
}

type SearchRecordPlantCountResults {
  occurrenceCount: Float!
  plantCount: Float!
}

type SearchRecordQueryResults {
  count: Float!
  results: [SearchRecord!]!
}

enum SearchRecordSortField {
  createdTimestamp
  locationName
  statusUpdatedTimestamp
  totalOccurrences
}

input SearchRecordSortInput {
  direction: Int!
  field: SearchRecordSortField!
}

enum SearchRecordStatus {
  COMPLETE
  READY
  SCRAPING
}

enum SearchRecordStringFilterField {
  locationSource
  status
}

input SearchRecordStringFilterInput {
  field: SearchRecordStringFilterField!
  value: String!
}

type UserGarden {
  gardenName: String!
  gardenThumbnailUrl: String
  plants: [GardenPlantData!]!
  totalPlants: Int!
  userId: String!
}