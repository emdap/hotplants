schema {
  query: Query
}

scalar JSON

type PlantData {
  bloomColors: [String]
  bloomTimes: [String]
  commonNames: [String]
  habitat: String
  hardiness: [Int]
  height: PlantSize
  isPerennial: Boolean
  lightLevels: [String]
  maturityTime: String
  mediaUrls: [String]
  occurrenceCoords: [[Int]]
  scientificName: String!
  soilTypes: [String]
  spread: PlantSize
  uses: [String]
}

type PlantSize {
  amount: Int
  unit: PlantSizeUnit
}

enum PlantSizeUnit {
  cm
  ft
  in
  m
}

type Query {
  plants(limit: Int, skip: Int, where: JSON): [PlantData]
}