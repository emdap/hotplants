app = 'hotplants'
primary_region = 'sjc'

[[services]]
auto_start_machines = true
auto_stop_machines = true
internal_port = 80
protocol = "tcp"

  [[services.ports]]
  handlers = ["http"]
  port = 80
  
  [[services.ports]]
  handlers = ["http", "tls"]
  port = 443

[[vm]]
cpu_kind = 'shared'
cpus = 1
memory = '1gb'
