schema {
  query: Query
  mutation: Mutation
}

type Mutation {
  replaceWithProxyUrl(plantId: ObjectId!, replaceUrl: String!): String
}

scalar ObjectId

type PlantData {
  _id: ObjectId!
  addedTimestamp: Float!
  bloomColors: [String!]
  bloomTimes: [String!]
  commonNames: [String!]
  fullMediaCount: Int
  habitat: String
  hardiness: [Int!]
  height: PlantSize
  isPerennial: Boolean
  lightLevels: [String!]
  maturityTime: String
  mediaUrls: [PlantMedia!]!
  occurrenceCoords: [[Float!]!]!
  occurrenceIds: [Float!]!
  physicalCharactersticsDump: String
  scientificName: String!
  scrapeSources: [String!]!
  soilTypes: [String!]
  spread: PlantSize
  updatedTimestamp: Float!
  uses: [String!]
}

input PlantDataInput {
  addedTimestamp: Float
  bloomColors: [String!]
  bloomTimes: [String!]
  boundingBox: [Float!]
  commonName: String
  habitat: String
  hardiness: [Int!]
  height: PlantSizeInput
  isPerennial: Boolean
  lightLevels: [String!]
  maturityTime: String
  occurrenceIds: [Float!]
  physicalCharactersticsDump: String
  scientificName: String
  scrapeSources: [String!]
  soilTypes: [String!]
  spread: PlantSizeInput
  updatedTimestamp: Float
  uses: [String!]
}

type PlantMedia {
  isProxyUrl: Boolean
  occurrenceId: Float!
  url: String!
}

type PlantSearchResults {
  count: Float!
  results: [PlantData!]!
}

type PlantSize {
  amount: Int
  unit: PlantSizeUnit
}

input PlantSizeInput {
  amount: Int
  unit: PlantSizeUnit
}

enum PlantSizeUnit {
  cm
  ft
  in
  m
}

type Query {
  plant(id: String!): PlantData
  plantMedia(id: String!, limit: Int, offset: Int): [PlantMedia!]!
  plantSearch(limit: Int, offset: Int, sort: SortInput, where: PlantDataInput): PlantSearchResults!
  searchRecord(id: String!): SearchRecord
}

type SearchRecord {
  endOfRecords: Boolean
  jsonStringSearch: String!
  status: SearchRecordStatus!
  statusUpdated: Float!
  totalOccurrences: Int!
}

enum SearchRecordStatus {
  DONE
  SCRAPING
}

enum SortDirection {
  asc
  desc
}

input SortInput {
  addedTimestamp: SortDirection
  scientificName: SortDirection
  updatedTimestamp: SortDirection
}